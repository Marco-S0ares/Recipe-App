<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="srcipt.js" defer></script>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <title>Recipe App</title>
  </head>
  <body>
    <div class="mobile-container">
      <header>
        <input type="text" />
        <button id="search"><i class="fa-solid fa-magnifying-glass"></i></button>
      </header>
      <div class="fav-container">
        <h3>Favorite meals</h3>
        <ul>
          <li>
            <img
              src="https://www.themealdb.com/images/media/meals/dxs5t71782678369.jpg"
              alt="comida"
            /><span>bolinho</span>
          </li>
          <li>
            <img
              src="https://www.themealdb.com/images/media/meals/04axct1763793018.jpg"
              alt="comida"
            /><span>carne</span>
          </li>
          <li>
            <img
              src="https://www.themealdb.com/images/media/meals/grhn401765687086.jpg"
              alt="comida"
            /><span>bolinho</span>
          </li>
        </ul>
      </div>
      <div class="meals">
        <span class="random">
            Random recipe
        </span>
        <div class="meal">
          <div class="meal-header">
            <img src="https://www.themealdb.com/images/media/meals/3m8yae1763257951.jpg" alt="" />
          </div>
          <div class="meal-body">
            <h4>Comiodas</h4>
            <button>
                <i class="fa-regular fa-heart"></i>
            </button>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
